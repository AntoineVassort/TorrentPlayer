name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
          # The upstream node-datachannel macOS prebuilts are compiled on recent
          # runners (macos-15-intel / macos-14) with no deployment-target floor, so
          # they link against newer libc++ symbols (e.g. basic_ifstream VTT) absent
          # on older macOS → "Symbol not found" crash at dlopen. Build from source
          # with a low deployment target instead so it runs down to Electron 32's
          # floor (macOS 10.15 Intel / 11.0 Apple Silicon). Homebrew's prefix — hence
          # the OpenSSL path — differs by arch: /usr/local (Intel) vs /opt/homebrew.
          - os: macos-15-intel
            script: dist:mac-x64
            buildFromSource: 'node-datachannel'
            deploymentTarget: '10.15'
            opensslRoot: /usr/local/opt/openssl@3
          - os: macos-14
            script: dist:mac-arm64
            buildFromSource: 'node-datachannel'
            deploymentTarget: '11.0'
            opensslRoot: /opt/homebrew/opt/openssl@3
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install OpenSSL (node-datachannel source build)
        if: matrix.buildFromSource != ''
        run: HOMEBREW_NO_INSTALL_CLEANUP=1 brew install openssl@3

      - name: Install dependencies
        run: npm ci
        env:
          # Empty for the Windows/Linux jobs → normal prebuilt download. Set for the
          # macOS jobs to force a from-source build of node-datachannel pinned to a
          # low libc++ deployment target.
          npm_config_build_from_source: ${{ matrix.buildFromSource }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deploymentTarget }}
          OPENSSL_ROOT_DIR: ${{ matrix.opensslRoot }}

      - name: Build
        run: npm run ${{ matrix.script }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/TorrentPlayer-win32-x64/* -DestinationPath TorrentPlayer-Windows-x64.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d TorrentPlayer-darwin-x64 ]; then
            zip -r ../TorrentPlayer-macOS-x64.zip TorrentPlayer-darwin-x64
          fi
          if [ -d TorrentPlayer-darwin-arm64 ]; then
            zip -r ../TorrentPlayer-macOS-arm64.zip TorrentPlayer-darwin-arm64
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../TorrentPlayer-Linux-x64.zip TorrentPlayer-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-${{ matrix.os }}
          path: TorrentPlayer-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: TorrentPlayer-*.zip
          generate_release_notes: true
