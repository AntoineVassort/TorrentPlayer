name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
          - os: macos-13
            script: dist:mac-x64
          - os: macos-14
            script: dist:mac-arm64
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/TorrentPlayer-win32-x64/* -DestinationPath TorrentPlayer-Windows-x64.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d TorrentPlayer-darwin-x64 ]; then
            zip -r ../TorrentPlayer-macOS-x64.zip TorrentPlayer-darwin-x64
          fi
          if [ -d TorrentPlayer-darwin-arm64 ]; then
            zip -r ../TorrentPlayer-macOS-arm64.zip TorrentPlayer-darwin-arm64
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../TorrentPlayer-Linux-x64.zip TorrentPlayer-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: TorrentPlayer-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TorrentPlayer-*.zip
          generate_release_notes: true
