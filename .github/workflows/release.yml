name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows exe
        run: npm run dist

      - name: Create ZIP
        run: Compress-Archive -Path dist/TorrentPlayer-win32-x64/* -DestinationPath TorrentPlayer-Windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TorrentPlayer-Windows-x64.zip
          generate_release_notes: true
